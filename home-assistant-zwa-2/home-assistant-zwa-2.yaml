esphome:
  name: home-assistant-zwa-2
  friendly_name: Home Assistant Connect ZWA-2
  min_version: 2025.12.1
  name_add_mac_suffix: true

esp32:
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

wifi:
  power_save_mode: none
  ap:

mdns:
  services:
    - service: "_zwave"
      protocol: "_tcp"
      port: 6053
      txt:
        protocol: "esphome"

api:

logger:

ota:
  - platform: esphome
    id: ota_esphome

uart:
  id: zg23_uart
  tx_pin: 14
  rx_pin: 13
  baud_rate: 115200

zwave_proxy:
  id: zw_proxy

bluetooth_proxy:
  id: zwa2_bt_proxy

esp32_ble_tracker:
  id: zwa2_ble_tracker

button:
  - platform: restart
    id: restart_btn
    name: Restart
    entity_category: diagnostic
    disabled_by_default: true

switch:
  - platform: template
    id: bluetooth_enabled_switch
    name: Bluetooth Proxy
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    # BT stack must be initialized before we can call enable/disable actions
    setup_priority: 275.0
    turn_on_action:
      - ble.enable:
    turn_off_action:
      - ble.disable:

select:
  - platform: template
    name: Bluetooth Scanner Mode
    id: scanner_mode
    options:
      - "Passive"
      - "Active"
    lambda: |-
      if (id(zwa2_ble_tracker).get_scan_active()) {
        return {"Active"};
      } else {
        return {"Passive"};
      }
    set_action:
      - lambda: |-
          id(zwa2_bt_proxy).bluetooth_scanner_set_mode(x == "Active");
      - component.update: scanner_mode
