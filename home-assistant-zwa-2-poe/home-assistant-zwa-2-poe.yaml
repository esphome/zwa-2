esphome:
  name: home-assistant-zwa-2-poe
  friendly_name: Home Assistant Connect ZWA-2
  min_version: 2025.12.1
  name_add_mac_suffix: true

esp32:
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

ethernet:
  type: W5500
  mosi_pin: GPIO11
  miso_pin: GPIO12
  clk_pin: GPIO13
  cs_pin: GPIO14
  reset_pin: GPIO9
  interrupt_pin: GPIO10

mdns:
  services:
    - service: "_zwave"
      protocol: "_tcp"
      port: 6053
      txt:
        protocol: "esphome"

api:

logger:
  # Because the USB interface is taken over to communicate
  #  with the ZWA-2, send logs to UART0 instead of USB
  hardware_uart: UART0

ota:
  - platform: esphome
    id: ota_esphome

usb_host:
  devices:
    - id: device_0
      vid: 0x303A
      pid: 0x4001

usb_uart:
  - type: CDC_ACM
    vid: 0x303A
    pid: 0x4001
    channels:
      - id: uch_1
        baud_rate: 115200
        buffer_size: 1024

zwave_proxy:
  id: zw_proxy

bluetooth_proxy:

button:
  - platform: restart
    id: restart_btn
    name: Restart
    entity_category: diagnostic
    disabled_by_default: true

switch:
  - platform: template
    id: bluetooth_enabled_switch
    name: Bluetooth Proxy
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    # BT stack must be initialized before we can call enable/disable actions
    setup_priority: 275.0
    turn_on_action:
      - ble.enable:
    turn_off_action:
      - ble.disable:
